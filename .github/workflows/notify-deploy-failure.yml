name: Notify Deploy Failure (reusable)

# Posts a Slack alert when a deploy workflow fails. Callers gate the call with
# `if: failure()` on their notify job; this workflow always posts when invoked
# (a status check here would evaluate against this run's own empty job graph
# and silently skip). Reusable workflows share the caller's run id, so the
# failed-jobs lookup reports the caller's jobs.

on:
  workflow_call:
    secrets:
      SLACK_DEPLOY_WEBHOOK:
        description: Slack incoming-webhook URL for deploy alerts
        required: true

jobs:
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    steps:
      - name: Build alert payload
        id: payload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          failed=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name] | join(", ")' 2>/dev/null || echo "")
          commit_title=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" \
            --jq '.commit.message | split("\n")[0]' 2>/dev/null || echo "")
          jq -n \
            --arg workflow "${{ github.workflow }}" \
            --arg repo "${{ github.repository }}" \
            --arg ref "${{ github.ref_name }}" \
            --arg failed "${failed:-unknown}" \
            --arg sha "${{ github.sha }}" \
            --arg commit_title "$commit_title" \
            --arg actor "${{ github.actor }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              text: ":red_circle: \($workflow) FAILED — \($repo) @ \($ref)",
              blocks: [
                {type: "section", text: {type: "mrkdwn",
                  text: ":red_circle: *\($workflow) FAILED* — `\($repo)` @ `\($ref)`"}},
                {type: "section", text: {type: "mrkdwn",
                  text: "*Failed jobs:* \($failed)\n*Commit:* `\($sha[0:7])` \($commit_title)\n*Actor:* \($actor)\n<\($run_url)|View run>"}}
              ]
            }' > payload.json

      - name: Post to Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-file-path: payload.json
