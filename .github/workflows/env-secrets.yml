name: Sync Env Secrets (reusable)

# Applies a service's runtime configuration for one environment as Kubernetes
# Secrets. The `values` input is KEY=value lines whose keys are the exact
# environment variable names the service reads (Orale NEO_X__SECTION__KEY
# naming); deployments consume it wholesale with envFrom. The optional `files`
# input is a JSON object of filename -> content applied as a second
# <name>-files Secret for volume mounting.
#
# Interim mechanism: values live in each repo's deploy-<env> workflow, sourced
# from GitHub secrets. The follow-up effort moves them into the Flux repo.

on:
  workflow_call:
    inputs:
      name:
        description: Kubernetes Secret name, e.g. neo-applications-service-config
        type: string
        required: true
      namespace:
        description: Kubernetes namespace to apply into
        type: string
        required: true
    secrets:
      kubeconfig:
        description: Kubeconfig for the target deploy cluster
        required: true
      values:
        description: KEY=value lines (env-file format, single-line values only)
        required: true
      files:
        description: 'Optional JSON object: {"filename": "content", ...}'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Apply env secret
        env:
          KUBECONFIG_DATA: ${{ secrets.kubeconfig }}
          VALUES: ${{ secrets.values }}
        run: |
          set -euo pipefail
          echo "$KUBECONFIG_DATA" > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          echo "$VALUES" > values.env
          kubectl create secret generic ${{ inputs.name }} \
            --namespace ${{ inputs.namespace }} \
            --from-env-file=values.env \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply files secret
        if: ${{ secrets.files != '' }}
        env:
          KUBECONFIG_DATA: ${{ secrets.kubeconfig }}
          FILES: ${{ secrets.files }}
        run: |
          set -euo pipefail
          echo "$KUBECONFIG_DATA" > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          mkdir -p files
          args=""
          for name in $(jq -r 'keys[]' <<<"$FILES"); do
            jq -r --arg k "$name" '.[$k]' <<<"$FILES" > "files/$name"
            args="$args --from-file=$name=files/$name"
          done
          kubectl create secret generic ${{ inputs.name }}-files \
            --namespace ${{ inputs.namespace }} \
            $args \
            --dry-run=client -o yaml | kubectl apply -f -
