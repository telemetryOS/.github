name: Image Build (reusable)

# Builds and pushes a Docker image to ghcr. Every image is tagged with its git
# refs and sha: branch or pr-<number> or git tag, plus sha-<commit>. An
# optional env channel tag (development/qa/stage/production) marks which
# environment the build feeds; deployment follows channel tags.
#
# Runtime configuration is passed via the env-vars secret (KEY=value lines):
# the workflow writes it to runtime.env, which the Dockerfile copies in and
# the entrypoint sources. Config files are not used. Interim mechanism — the
# follow-up effort moves runtime config out of the image into Flux.

on:
  workflow_call:
    inputs:
      image:
        description: Full image name without tag, e.g. ghcr.io/telemetryos/neo-applications-service
        type: string
        required: true
      dockerfile:
        description: Dockerfile path relative to the repo root
        type: string
        required: true
      channel:
        description: Optional env channel tag (development, qa, stage, production)
        type: string
        required: false
        default: ''
      ref:
        description: Optional explicit commit to build (e.g. workflow_run head_sha)
        type: string
        required: false
        default: ''
    secrets:
      PRIVATE_REPO_TOKEN:
        description: Token for private Go module access
        required: true
      env-vars:
        description: KEY=value lines baked into the image as runtime env (single-line values)
        required: false
      files:
        description: 'Optional JSON object {"filename": "content"} written into the build context (e.g. an embedded kubeconfig); repos commit empty placeholders for files their Dockerfile copies'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Build the exact commit: an explicit ref when given, the PR head
          # (not the ephemeral merge commit) for pull requests, HEAD otherwise.
          ref: ${{ inputs.ref != '' && inputs.ref || (github.event_name == 'pull_request' && github.event.pull_request.head.sha || '') }}
          fetch-depth: 0

      - name: Resolve build metadata
        id: build_meta
        run: |
          if [ -n "${{ inputs.ref }}" ]; then
            sha="${{ inputs.ref }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            sha="${{ github.event.pull_request.head.sha }}"
          else
            sha="${{ github.sha }}"
          fi
          {
            echo "sha=${sha}"
            echo "version=$(date -u +%y.%m).${GITHUB_RUN_NUMBER}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Write runtime env
        env:
          ENV_VARS: ${{ secrets.env-vars }}
        run: |
          python3 - <<'PY'
          import os
          lines = []
          for line in os.environ.get('ENV_VARS', '').splitlines():
              line = line.strip()
              if not line or line.startswith('#'):
                  continue
              key, _, value = line.partition('=')
              quoted = value.replace("'", "'\\''")
              lines.append(f"{key}='{quoted}'")
          with open('runtime.env', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          PY

      - name: Write context files
        if: ${{ secrets.files != '' }}
        env:
          FILES: ${{ secrets.files }}
        run: |
          python3 - <<'PY'
          import json, os
          for name, content in json.loads(os.environ['FILES']).items():
              assert '/' not in name and name not in ('.', '..')
              with open(name, 'w') as f:
                  f.write(content)
          PY

      - name: Calculate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=raw,value=sha-${{ steps.build_meta.outputs.sha }}
            type=raw,value=${{ inputs.channel }},enable=${{ inputs.channel != '' }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.PRIVATE_REPO_TOKEN }}
            GIT_COMMIT=${{ steps.build_meta.outputs.sha }}
            BUILD_VERSION=${{ steps.build_meta.outputs.version }}
            RUN_NUMBER=${{ steps.build_meta.outputs.run_number }}
            BUILT_AT=${{ steps.build_meta.outputs.built_at }}
